<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <linearGradient id="silverM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="20%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#cccccc"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <radialGradient id="redBall" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ff6666"/>
      <stop offset="50%" stop-color="#cc1111"/>
      <stop offset="100%" stop-color="#6b0000"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>

  <!-- Circular dark background -->
  <circle cx="150" cy="150" r="149" fill="url(#bgGrad)"/>
  <!-- Red outer border ring -->
  <circle cx="150" cy="150" r="143" fill="none" stroke="#cc1111" stroke-width="5.5"/>
  <!-- Inner subtle ring -->
  <circle cx="150" cy="150" r="135" fill="none" stroke="rgba(180,20,20,0.25)" stroke-width="1.5"/>

  <!-- M letter: left vertical bar -->
  <path d="M76,192 L76,98 L101,98 L101,192 Z" fill="url(#silverM)" filter="url(#shadow)"/>
  <!-- M letter: left diagonal to center -->
  <path d="M76,98 L101,98 L152,160 L103,160 Z" fill="url(#silverM)" filter="url(#shadow)"/>
  <!-- M letter: right diagonal from center -->
  <path d="M152,160 L200,98 L225,98 L197,160 Z" fill="url(#silverM)" filter="url(#shadow)"/>
  <!-- M letter: right vertical bar -->
  <path d="M200,98 L225,98 L225,192 L200,192 Z" fill="url(#silverM)" filter="url(#shadow)"/>

  <!-- Subtle shading on M for 3D depth -->
  <path d="M101,98 L101,192 L106,192 L106,160 L155,105 Z" fill="rgba(0,0,0,0.12)"/>
  <path d="M200,98 L200,160 L205,192 L205,98 Z" fill="rgba(0,0,0,0.10)"/>

  <!-- Red sphere at top-center peak of M -->
  <circle cx="150" cy="98" r="22" fill="url(#redBall)" filter="url(#shadow)"/>
  <!-- Highlight on red sphere -->
  <ellipse cx="142" cy="90" rx="8" ry="6" fill="rgba(255,255,255,0.28)"/>

  <!-- MULTI-TÉCNICA text -->
  <text x="150" y="225"
        text-anchor="middle"
        font-family="'Arial Black', Impact, 'Helvetica Neue', sans-serif"
        font-size="21" font-weight="900"
        fill="#cc1111" letter-spacing="2">MULTI-TÉCNICA</text>

  <!-- Subtitle text -->
  <text x="150" y="244"
        text-anchor="middle"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-size="9.5" fill="#aaaaaa" letter-spacing="1.2">COMPUTADORES E IMPRESSORAS</text>
</svg>
